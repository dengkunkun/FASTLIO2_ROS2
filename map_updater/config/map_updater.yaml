# =============================================================================
# MapUpdater Node Configuration
# =============================================================================
# Maintains incrementally updated global point cloud map for fire detection.
# Input:  FASTLIO2 world_cloud (去畸变、IESKF最优位姿、世界坐标系) + lio_odom
# Output: /map_updater/updated_map (PointCloud2)
# =============================================================================

# --- Map I/O ---
initial_pcd_path: "/home/firebot/firebot_dragon/maps/fastlio_test_3/map.pcd"                             # 初始 PCD 路径 (空 = 空地图)
map_frame: "map_camera_init"                          # 地图坐标系 (FASTLIO2 世界坐标系)

# --- LiDAR Input ---
# 使用 FASTLIO2 去畸变后的世界坐标系点云 (PointXYZINormal, camera_init 坐标系)
# 优势：IMU+LiDAR联合去畸变、IESKF最优位姿、保留天花板（未被 mid360_filter 过滤）
scan_topic: "/fastlio2/world_cloud"
odom_topic: "/fastlio2/lio_odom"                  # 用于获取传感器原点 (射线追踪起点)
scan_frame: "camera_init"                         # scan_topic 和 odom_topic 的坐标系
                                                   # 当与 map_frame 不同时，自动通过 TF 变换
scan_process_interval_s: 0.5                      # 扫描处理最小间隔 (秒)

# --- Resolution ---
map_resolution: 0.2                               # ikd-tree 体素降采样大小 (m)
scan_resolution: 0.15                             # 输入扫描预过滤分辨率 (m)
# 点云清除用的独立体素分辨率，需细于 map_resolution。
# 0.2m时人的痕迹与后方墙面会映射到同一voxel key，导致每帧被reset永远无法清除。
# 0.05m可将两者分隔，确保miss_count能正常积累到阈值。
removal_voxel_resolution: 0.05                    # VoxelHashMap 分辨率 (m)，独立于 ikd-tree

# --- Publishing ---
publish_rate_hz: 1.0                              # 地图发布频率 (Hz)

# --- Point Removal ---
enable_point_removal: true                        # 是否启用过时点删除
ray_cast_skip: 1                                  # 每 N 个点做一次射线追踪 (降低开销)

# --- Log-odds 概率占据模型 (OctoMap 风格) ---
# 每个体素维护一个 log-odds 置信值：正值 = 占据，负值 = 空闲。
# 命中证据 (+0.847) 约是未命中证据 (-0.405) 的 2 倍强度，
# 因此稳定墙面天然抵抗噪声侵蚀。
#
# 关键机制：
#   1. 不对称更新：hit >> miss，观测过的墙壁需要远多于miss才能被删除
#   2. Clamping：log-odds 被限制在 [clamp_min, clamp_max]，防止无限累积
#   3. 每帧去重：每个体素每个扫描周期最多接收 1 次 miss，防止多射线
#      在一帧内压倒一个体素
#
# 举例（默认参数，initial=2.0）：
#   - 新建体素 log_odds=2.0, 每帧 1 miss (-0.405)
#     需要 (2.0+1.0)/0.405 ≈ 8 帧才能到达 free_threshold=-1.0 被删除
#   - 饱和墙面 log_odds=3.5, 需要 (3.5+1.0)/0.405 ≈ 11 帧才被删除
#   - 有 hit 补充的墙面：每帧 hit(+0.847)+miss(-0.405)= 净 +0.442 → 永不删除
log_odds_hit: 0.847              # logodds(0.7): 每次命中的占据证据
log_odds_miss: 0.405             # |logodds(0.4)|: 每次穿越的空闲证据 (正值)
log_odds_clamp_max: 3.5          # logodds(0.971): 最大占据置信
log_odds_clamp_min: -2.0         # logodds(0.1192): 最大空闲置信
log_odds_free_threshold: -1.0    # 体素 log_odds 低于此值时被删除
log_odds_initial: 2.0            # 新建体素的初始置信值

# --- 端点保护球 ---
# 射线在到达端点之前，提前在距端点 protection_radius 处停止。
# 保护球内的体素不会被该射线记为"未命中"，避免：
#   (a) VoxelGrid预滤波质心偏移（最大 scan_resolution/2 ≈ 7.5cm）把扫描
#       端点推入相邻体素，使射线穿越真实墙面体素
#   (b) LiDAR测距噪声（MID360约±2cm）引起端点在相邻0.05m体素间抖动
# protection_radius = base + ray_length × angle_factor
endpoint_protection_base_m: 0.05          # 保护球基础半径 (m)
endpoint_protection_angle_factor: 0.02   # 每米距离增加的保护半径 (m/m)

# --- Diagnostics ---
diag_interval_s: 10.0                             # 诊断日志间隔 (秒)
diag_sector_radius_m: 6.0                         # 定向诊断扇区半径 (m)
diag_sector_fov_deg: 90.0                         # 定向诊断扇区视场角 (deg)
